<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>新傾向ポータル</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
</head>
<body>

<!-- =========================
     ヘッダー（ロゴのみ）
========================= -->
<header class="header">
  <a href="index.html" class="header-logo">
    <img src="assets/images/logo.png" alt="新傾向ロゴ">
  </a>
</header>

<!-- =========================
     メニュー（見出し＋4ボタン 2×2）
========================= -->
<section id="menu" class="section">
  <h2 class="section-title">メニュー</h2>

  <div class="top-buttons">
    <button data-scroll="menu-links">メニュー</button>
    <button data-scroll="scratch">Scratchと連携</button>
    <button data-scroll="news">お知らせ</button>
    <a href="articles.html"><button>記事</button></a>
  </div>
</section>

<!-- =========================
     カードスライダー
========================= -->
<section class="card-slider">

  <div class="card-slider-track">

    <div class="card-slide">
      <div class="modelabo-card">
        <div class="modelabo-card-image">
          <img src="assets/images/01.png" alt="">
        </div>
        <div class="modelabo-card-text">
          <div class="modelabo-card-title">新傾向の公式ポータルです！</div>
          <div class="modelabo-card-desc">
            新傾向ポータルです。新傾向のあれこれがここで分かります。
          </div>
          <div class="modelabo-card-btn">
            <a href="about.html" class="modelabo-btn">詳細を見る</a>
          </div>
        </div>
      </div>
    </div>

    <div class="card-slide">
      <div class="modelabo-card">
        <div class="modelabo-card-image">
          <img src="assets/images/02.png" alt="">
        </div>
        <div class="modelabo-card-text">
          <div class="modelabo-card-title">ランキングが毎日更新！</div>
          <div class="modelabo-card-desc">
            GitHub の README から自動取得して最新ランキングを表示します。
          </div>
          <div class="modelabo-card-btn">
            <a href="ranking.html" class="modelabo-btn">ランキングを見る</a>
          </div>
        </div>
      </div>
    </div>

    <div class="card-slide">
      <div class="modelabo-card">
        <div class="modelabo-card-image">
          <img src="assets/images/03.png" alt="">
        </div>
        <div class="modelabo-card-text">
          <div class="modelabo-card-title">作品応募はこちら！</div>
          <div class="modelabo-card-desc">
            Scratch の応募ページから簡単に申請できます。
          </div>
          <div class="modelabo-card-btn">
            <a href="apply.html" class="modelabo-btn">応募する</a>
          </div>
        </div>
      </div>
    </div>

  </div>

  <button class="slider-btn prev">‹</button>
  <button class="slider-btn next">›</button>

  <div class="slider-dots"></div>

</section>

<!-- =========================
     ポータル内リンク（旧メニューセクション）
========================= -->
<section id="menu-links" class="section">
  <h2 class="section-title">ポータル内リンク</h2>

  <div class="menu">
    <a href="about.html" class="menu-item">
      <span class="material-icons-outlined">info</span>
      新傾向とは？
    </a>

    <a href="ranking.html" class="menu-item">
      <span class="material-icons-outlined">leaderboard</span>
      ランキングを見る
    </a>

    <a href="apply.html" class="menu-item">
      <span class="material-icons-outlined">send</span>
      応募する
    </a>

    <a href="support.html" class="menu-item">
      <span class="material-icons-outlined">volunteer_activism</span>
      運営に協力する
    </a>
  </div>
</section>

<!-- =========================
     Scratchと連携
========================= -->
<section id="scratch" class="section">
  <h2 class="section-title">Scratchと連携</h2>
  <p class="center-text">Scratchと連携するにはこちら</p>
  <a href="https://scra.3y.f5.si/" target="_blank" class="link-button">Scratchと連携する</a>
</section>

<!-- =========================
     お知らせ
========================= -->
<section id="news" class="section">
  <h2 class="section-title">お知らせ</h2>

  <div class="news-box" id="news-box">
    読み込み中…
  </div>
</section>

<script src="assets/js/slider.js"></script>
<script src="assets/js/news.js"></script>
<script src="assets/js/scroll.js"></script>

</body>
</html>
